<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Main Dashboard</title>
         <link rel="stylesheet" href="style.css">
    </head>
    <body>
      
        <button class = "webHeader">POMO.</button>
     <div class = "explanation">
        <h1>productive tool to focus on your tasks</h1>
    </div>
        <div id = "pomodoro">
            <button id = "openBth">Keep in Mind</button>
            <div id = "modal" class = "modalOverlay">
                <div class = "modalBox">
                    <h2 id = "modalText"> Click to start timer, double-click to stop, reset to start over. Add tasks as you go! Remember to stay hydrated and take breaks. Happy productivity! </h2>
                    <button id = "closeBtn" class = "modalClose">x</button>
                </div>
            </div>
            <div class = "form">
                <form>
                    <div class = "enterTask">
                   <label for="task">Enter your task: </label>
                    </div>
                    <input minlength = "4" maxlength="20" id = "task" name="task" placeholder="Let's get started">
                    <input id = "submit" type = "submit" value="submit">
                </form>

            </div>
<!-- task List-->
            <div class = "taskList">
            <ul  id = "taskList">


            </ul>





</div>
<!--task List End-->
<!--controls-->
            <div class = "controls">
                <div id = "group1"><h1 id = "timer">50:00</h1>
                <button onclick="setPomodoro()" ondblclick = "stopTimer()">Pomodoro</button>
                <button onclick="setShortBreak()" ondblclick = "stopTimer()">Short Break</button>
                <button onclick="setLongBreak()" ondblclick = "stopTimer()">Long Break</button>
                <button onclick = "resetTimer()" >Reset Timer</button>
             </div>
                
            </div>
            
                
            
        </div>
        <script src="script.js"></script>
    </body>
</html>
